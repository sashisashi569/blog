<span class="post-meta">
  <time datetime="{{ include.post.date | date_to_xmlschema }}">
    {{ include.post.date | date: "%Y年%-m月%-d日" }}
  </time>
  {%- if include.post.categories.size > 0 -%}
    &nbsp;&middot;&nbsp;
    {%- for cat in include.post.categories -%}
      <a href="{{ "/categories/" | relative_url }}#{{ cat | slugify }}">{{ cat }}</a>
      {%- unless forloop.last -%}、{%- endunless -%}
    {%- endfor -%}
  {%- endif -%}
</span>
