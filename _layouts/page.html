layout: default
---

<article class="page" itemscope itemtype="http://schema.org/WebPage">
  <header class="post-header">
    <h1 class="post-title" itemprop="name">{{ page.title | escape }}</h1>
  </header>
  <div class="post-content e-content" itemprop="description">
    {{ content }}
  </div>
</article>
